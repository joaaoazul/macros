services:
  db:
    image: postgres:16-alpine
    container_name: macros-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: macros
      POSTGRES_PASSWORD: ${DB_PASSWORD:?define DB_PASSWORD no .env}
      POSTGRES_DB: macros
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U macros"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  backend:
    build: ./backend
    container_name: macros-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://macros:${DB_PASSWORD}@db:5432/macros
      DATABASE_URL_SYNC: postgresql+psycopg2://macros:${DB_PASSWORD}@db:5432/macros
      JWT_SECRET: ${JWT_SECRET:?define JWT_SECRET no .env}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Macros <macros@joaoazul.dev>}
      APP_URL: ${APP_URL:-https://macros.joaoazul.dev}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:joaoazul74@gmail.com}
      ALERT_NTFY_URL: ${ALERT_NTFY_URL:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_MONTHLY: ${STRIPE_PRICE_MONTHLY:-}
      STRIPE_PRICE_ANNUAL: ${STRIPE_PRICE_ANNUAL:-}
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build: .
    container_name: macros
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend
    networks:
      - internal

networks:
  internal:

volumes:
  pgdata:
