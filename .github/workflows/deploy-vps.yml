name: Deploy to VPS

# Faz deploy por SSH: git pull + docker compose build no VPS.
# Requer secrets no repositório (Settings → Secrets and variables → Actions):
#   VPS_HOST — IP ou hostname do VPS
#   VPS_USER — utilizador SSH
#   VPS_SSH_KEY — chave privada SSH (par público em ~/.ssh/authorized_keys do VPS)
# Opcional:
#   VPS_PORT — porta SSH se não for a 22
#   VPS_PATH — pasta do projeto no VPS (por omissão ~/macros)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vps-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HAS_SECRETS: ${{ secrets.VPS_HOST != '' && secrets.VPS_SSH_KEY != '' }}
    steps:
      - name: Deploy via SSH
        if: env.HAS_SECRETS == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          PORT="${VPS_PORT:-22}"
          DEST="${VPS_PATH:-macros}"
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -p "$PORT" "$VPS_USER@$VPS_HOST" \
            "cd $DEST && git pull --ff-only && docker compose up -d --build"
          echo "✅ Deploy concluído em $VPS_HOST"
      - name: Secrets em falta
        if: env.HAS_SECRETS != 'true'
        run: echo "Secrets VPS_HOST/VPS_SSH_KEY não configurados — deploy ignorado."
