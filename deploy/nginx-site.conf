# Site nginx para instalação direta no VPS (sem Docker).
# Copiado pelo setup-vps.sh para /etc/nginx/sites-available/macros
# Se tiveres um domínio, troca o server_name e corre depois:
#   sudo certbot --nginx -d oteu.dominio.pt
server {
  listen 80;
  server_name _;
  root /var/www/macros;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location /api/ {
    proxy_pass http://127.0.0.1:8787;
    proxy_set_header Host $host;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
