server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 5m;  # fotos p/ análise IA (downscaled no cliente)

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  # Headers de segurança (o Caddy no host trata do TLS/HSTS)
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;  # câmara p/ scanner de códigos
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss://macros.joaoazul.dev https://pt.openfoodfacts.org; frame-ancestors 'none'; base-uri 'self'" always;

  # WebSocket (mensagens em tempo real) — precisa dos headers de upgrade
  location = /api/v1/ws {
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 120s;  # > intervalo de ping (30s)
    proxy_send_timeout 120s;
  }

  # SSE do feed SOC — sem buffering para os eventos chegarem em tempo real
  location = /api/v1/admin/audit/stream {
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
  }

  # API → backend (rede interna do compose)
  location /api/ {
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  # assets com hash no nome podem ser cacheados para sempre
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header X-Content-Type-Options "nosniff" always;
  }

  # SPA: qualquer rota cai no index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
